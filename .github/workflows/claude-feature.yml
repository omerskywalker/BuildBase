name: Claude Feature Implementation

on:
  workflow_dispatch:
    inputs:
      item_id:
        description: "Roadmap item ID (e.g. 1-1)"
        required: true
        type: string
      item_title:
        description: "Roadmap item title"
        required: true
        type: string
      item_description:
        description: "Roadmap item description"
        required: true
        type: string
      branch_name:
        description: "Branch name (already created by kickoff API)"
        required: true
        type: string
      issue_number:
        description: "GitHub Issue number tracking this item (e.g. 13)"
        required: false
        default: ""
        type: string
      pr_number:
        description: "Draft PR number created by kickoff API (e.g. 42)"
        required: false
        default: ""
        type: string
      retry:
        description: "Is this a retry run?"
        required: false
        default: "false"
        type: string

jobs:
  implement:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch_name }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are implementing roadmap item ${{ inputs.item_id }} for BuildBase.

            **Item:** ${{ inputs.item_title }}
            **Description:** ${{ inputs.item_description }}
            **Branch:** ${{ inputs.branch_name }}
            ${{ inputs.issue_number != '' && format('**GitHub Issue:** #{0} — read it for the full implementation spec. The PR body already includes `Closes #{0}` so the issue auto-closes when this PR merges.', inputs.issue_number) || '' }}
            ${{ inputs.pr_number != '' && format('**Draft PR:** #{0} — already open, push commits to it. Do NOT create a new PR.', inputs.pr_number) || '' }}

            Read CLAUDE.md first for full project context, conventions, and architecture.
            Read WIKI/index.md for current project status.
            Read WIKI/gotchas.md for known pitfalls.

            Implement this roadmap item completely:
            1. Read GitHub Issue #${{ inputs.issue_number }} for the full spec, file scope contract, and agent references.
            2. Write all necessary code changes, respecting the FILE SCOPE CONTRACT if present.
            3. Write tests (see CLAUDE.md for test requirements).
            4. Run `pnpm tsc --noEmit` and fix all type errors.
            5. Run `pnpm test` and fix all failing tests.
            6. Update lib/roadmap-data.ts for item ${{ inputs.item_id }}:
               - Set status to "in-progress"
               ${{ inputs.pr_number != '' && format('- Set pr to {0}', inputs.pr_number) || '' }}
               ${{ inputs.issue_number != '' && format('- Set issue to {0} (already set, just confirm)', inputs.issue_number) || '' }}
               EXCEPTION: if the description contains FILE SCOPE CONTRACT, skip lib/roadmap-data.ts entirely — the kickoff system manages it.

            Do NOT create a new PR — draft PR #${{ inputs.pr_number }} already exists.

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Test
        run: pnpm test

      - name: Commit and push
        run: |
          git add -A
          git commit -m "feat: implement ${{ inputs.item_id }} — ${{ inputs.item_title }}

          Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>" || echo "Nothing to commit"
          git push origin "${{ inputs.branch_name }}"

      - name: Mark PR ready for review
        if: ${{ inputs.pr_number != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr ready ${{ inputs.pr_number }} --repo ${{ github.repository }} || true
