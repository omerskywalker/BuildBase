kind = "web"
previewPath = "/"
title = "BuildBase"
version = "1.0.0"
id = "artifacts/buildbase"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23235

[services.development]
run = "pnpm --filter @workspace/buildbase run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/buildbase", "run", "build" ]
publicDir = "artifacts/buildbase/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23235"
BASE_PATH = "/"
